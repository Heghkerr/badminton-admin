<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#16a34a" />
    <title>Offline</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 24px; background:#f8fafc; color:#0f172a; }
      .card { max-width: 520px; margin: 10vh auto 0; background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:20px; }
      h1 { margin:0 0 8px; font-size:18px; }
      p { margin:0; color:#475569; line-height:1.5; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Kamu sedang offline</h1>
      <p>Halaman ini tidak bisa dibuka tanpa koneksi. Kalau sebelumnya sudah pernah dibuka, beberapa halaman bisa tetap tampil dari cache.</p>
    </div>
  </body>
</html>
